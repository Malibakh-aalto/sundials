name: Build and Test
description: Builds and tests SUNDIALS using the test_driver.sh script

inputs:
  precision:
    description: SUNDIALS_PRECISION
    required: true
  indexsize:
    description: SUNDIALS_INDEX_SIZE
    required: true
  tpls:
    description: "enable/disable TPLs"
    required: true
  phase:
    description: "Optional phase passed to test_driver.sh as --phase <PHASE> (e.g., BUILD)"
    required: false
    default: ""

runs:
  using: composite
  steps:
    - id: container-information
      run: |
          cat /proc/cpuinfo
          uname -p
      shell: bash
    - id: spack-find
      run: |
          eval `/opt/spack/bin/spack env activate --sh /opt/spack-environment`
          /opt/spack/bin/spack find -v
      shell: bash
    - id: run-test-driver
      run: |
        git config --global --add safe.directory $GITHUB_WORKSPACE
        cd test
        extra_args=""
        if [ -n "${{ inputs.phase }}" ]; then
          extra_args=" --phase ${{ inputs.phase }}"
        fi
        ./test_driver.sh \
        --testtype CUSTOM \
        --env env/docker.sh \
        --tpls ${{ inputs.tpls }} \
        --sunrealtype ${{ inputs.precision }} \
        --indexsize ${{ inputs.indexsize }} \
        ${extra_args}
      shell: bash
